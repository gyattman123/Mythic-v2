<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythic</title>

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="index.css" />

    <!-- Scramjet (UNCHANGED) -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
</head>

<body>

<!-- Background -->
<video id="wallpaper-default" autoplay loop muted playsinline>
    <source src="/wallpaper.mp4" type="video/mp4" />
</video>

<!-- UI -->
<div id="start-page">

    <!-- Clock -->
    <div class="clock-container">
        <div id="clock-time">00:00</div>
        <div id="clock-date">LOADING SYSTEM</div>
    </div>

    <!-- 🔥 THIS IS THE IMPORTANT PART -->
    <!-- EXACT SAME STRUCTURE AS WORKING VERSION -->
    <form id="sj-form">

        <!-- REQUIRED -->
        <input
            id="sj-search-engine"
            value="https://www.google.com/search?q=%s"
            type="hidden"
        />

        <!-- YOUR STYLED INPUT -->
        <div class="search-pill">
            <i class="ph ph-magnifying-glass"></i>

            <input
                id="sj-address"
                type="text"
                placeholder="Search the web or enter URL..."
                autocomplete="off"
            />
        </div>

    </form>

    <!-- Apps -->
    <div id="app-grid"></div>

</div>

<script>
// CLOCK
function updateClock() {
    const now = new Date();
    document.getElementById("clock-time").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    document.getElementById("clock-date").textContent =
        now.toLocaleDateString(undefined, {
            weekday: "long",
            month: "long",
            day: "numeric"
        });
}

// APPS
const apps = [
    { name: "DuckDuckGo", icon: "ph-globe", url: "https://duckduckgo.com" },
    { name: "Wikipedia", icon: "ph-book-open", url: "https://en.m.wikipedia.org" }
];

function renderApps() {
    const grid = document.getElementById("app-grid");

    apps.forEach(app => {
        const el = document.createElement("div");
        el.innerHTML = `<i class="ph ${app.icon}"></i><div>${app.name}</div>`;

        // 🔥 THIS is how apps should work with Scramjet
        el.onclick = () => {
            const input = document.getElementById("sj-address");
            input.value = app.url;

            // trigger SAME flow as typing + enter
            document.getElementById("sj-form").requestSubmit();
        };

        grid.appendChild(el);
    });
}

// INIT
window.onload = () => {
    updateClock();
    setInterval(updateClock, 1000);
    renderApps();
};
</script>

</body>
</html>

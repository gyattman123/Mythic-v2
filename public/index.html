<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythic</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />

    <!-- Scramjet / BareMux for logic -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
</head>
<body>

    <!-- Background Video -->
    <video
        id="wallpaper-default"
        class="wallpaper-layer"
        autoplay
        loop
        muted
        playsinline
    >
        <source src="/wallpaper.mp4" type="video/mp4" />
    </video>

    <!-- Start Page -->
    <div id="start-page">
        <div class="clock-container animate-in">
            <div class="clock-time" id="clock-time">00:00</div>
            <div class="clock-date" id="clock-date">LOADING SYSTEM</div>
        </div>

        <div class="search-container animate-in delay-1">
            <div class="search-pill">
                <i
                    class="ph ph-magnifying-glass"
                    style="font-size: 1.4rem; color: var(--accent-primary)"
                ></i>

                <!-- OLD LOGIC IDS HOOKED -->
                <input
                    type="text"
                    id="sj-address"
                    class="search-input"
                    placeholder="Search the web or enter URL..."
                    autocomplete="off"
                />
                <input
                    type="hidden"
                    id="sj-search-engine"
                    value="https://www.google.com/search?q=%s"
                />

                <div id="loading-indicator" style="display: none">
                    <i class="ph ph-spinner ph-spin"></i>
                </div>
            </div>
        </div>

        <div class="app-grid animate-in delay-2" id="app-grid"></div>
    </div>

    <!-- Optional iframe if Scramjet uses it -->
    <iframe id="sj-frame" style="display:none;"></iframe>

    <script>
    // --- CLOCK & APPS ---
    const defaultApps = [
        { name: "DuckDuckGo", icon: "ph-globe", url: "https://duckduckgo.com" },
        { name: "Wikipedia", icon: "ph-book-open", url: "https://en.m.wikipedia.org" },
        { name: "VS Code", icon: "ph-code", url: "https://vscode.dev" },
        { name: "Music", icon: "ph-music-notes", url: "https://soundcloud.com" },
        { name: "Gaming", icon: "ph-game-controller", url: "https://poki.com" },
        { name: "Reddit", icon: "ph-reddit-logo", url: "https://reddit.com" },
    ];

    window.onload = () => {
        renderApps();
        updateClock();
        setInterval(updateClock, 1000);
    };

    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const dateString = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

        document.getElementById("clock-time").textContent = timeString;
        document.getElementById("clock-date").textContent = dateString;
    }

    function renderApps() {
        const grid = document.getElementById("app-grid");
        if (!grid) return;

        defaultApps.forEach((app) => {
            const el = document.createElement("div");
            el.className = "app-shortcut";
            el.innerHTML = `
                <div class="app-icon-box"><i class="ph ${app.icon}"></i></div>
                <div class="app-label">${app.name}</div>
            `;
            el.onclick = () => window.location.href = app.url;
            grid.appendChild(el);
        });
    }
    </script>
</body>
</html>

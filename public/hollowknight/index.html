<!DOCTYPE html><html lang="en-us"><head><meta charset="utf-8"><title>Hollow Knight</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}#lt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font:24px Arial}#unity-canvas{width:100vw;height:100vh;display:block}.btn{position:fixed;top:12px;padding:10px 18px;cursor:pointer;background:rgba(50,50,50,.85);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;font:14px Arial;z-index:9999}.btn:hover{background:rgba(70,70,70,.95)}</style></head><body>
<link rel="preload" href="sharedassets8.resource" as="fetch">
<link rel="preload" href="sharedassets127.resource" as="fetch">
<link rel="preload" href="sharedassets400.resource" as="fetch">
<link rel="preload" href="sharedassets410.resource" as="fetch">
<div id="lt">Loading...</div>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PXHK7Q7G3Z"></script>
<script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
        dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-PXHK7Q7G3Z');
</script>
<canvas id="unity-canvas"></canvas>
<script>
const lt=document.getElementById('lt'),cv=document.getElementById('unity-canvas');
let lb=0;const tm='912.81';

async function fwp(u){const r=await fetch(u),rd=r.body.getReader(),ch=[];while(true){const{done,value}=await rd.read();if(done)break;lb+=value.length;ch.push(value);lt.textContent=`${(lb/1048576).toFixed(2)} MB / ${tm} MB`;}return URL.createObjectURL(new Blob(ch));}
async function mf(p){const b=await Promise.all(p.map(fwp)),bl=await Promise.all(b.map(u=>fetch(u).then(r=>r.blob())));return URL.createObjectURL(new Blob(bl));}
function gp(f,s,e){return Array.from({length:e-s+1},(_,i)=>`${f}.part${s+i}`);}

(async()=>{
  const[du,wu]=await Promise.all([mf(gp('Build/hktruffled.data',1,45)),mf(gp('Build/hktruffled.wasm',1,2))]);
  const sc=document.createElement('script');sc.src='Build/hktruffled.loader.js';
  sc.onload=()=>createUnityInstance(cv,{dataUrl:du,frameworkUrl:'Build/hktruffled.framework.js',codeUrl:wu,streamingAssetsUrl:'StreamingAssets',companyName:'Team Cherry',productName:'Hollow Knight',productVersion:'1.0',memory:384*1024*1024,useWebGL2:true,webglContextAttributes:{antialias:false,alpha:false,depth:true,stencil:false,premultipliedAlpha:false,preserveDrawingBuffer:false,desynchronized:true}}).then(()=>{lt.remove();addButtons();}).catch(alert);
  document.body.appendChild(sc);
})();

function addButtons(){
  const dl=document.createElement('button');dl.className='btn';dl.style.right='12px';dl.textContent='Download Save';dl.onclick=saveExport;document.body.appendChild(dl);
  const im=document.createElement('button');im.className='btn';im.style.right='155px';im.textContent='Import Save';im.onclick=()=>fi.click();document.body.appendChild(im);
}

function saveExport(){
  const req=indexedDB.open('/idbfs');
  req.onsuccess=e=>{
    const db=e.target.result,tx=db.transaction('FILE_DATA','readonly'),store=tx.objectStore('FILE_DATA');
    const vr=store.getAll(),kr=store.getAllKeys();
    vr.onsuccess=()=>kr.onsuccess=()=>{
      const data=kr.result.map((key,i)=>{
        let c=vr.result[i].contents;
        if(c instanceof Int8Array){const o={};for(let j=0;j<c.length;j++)o[j]=c[j];c=o;}
        return{key,value:{timestamp:vr.result[i].timestamp,mode:vr.result[i].mode,contents:c}};
      });
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='hk-save.json';a.click();
    };
  };
}

const fi=document.createElement('input');fi.type='file';fi.accept='.json';fi.style.display='none';document.body.appendChild(fi);
fi.onchange=()=>{
  const file=fi.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let entries;try{entries=JSON.parse(reader.result);}catch{console.error('Invalid JSON');return;}
    const req=indexedDB.open('/idbfs');
    req.onsuccess=e=>{
      const db=e.target.result,tx=db.transaction('FILE_DATA','readwrite'),store=tx.objectStore('FILE_DATA');
      store.getAllKeys().onsuccess=ev=>{
        const keys=ev.target.result;if(!keys.length)return;
        const hash=keys[0].split('/')[2];
        keys.forEach(k=>{if(!k.includes(hash))store.delete(k);});
        entries.forEach(entry=>{
          const parts=entry.key.split('/');parts[2]=hash;
          let c=entry.value.contents;
          if(c&&typeof c==='object'&&!(c instanceof Int8Array)){const idx=Object.keys(c).map(Number).sort((a,b)=>a-b);const arr=new Int8Array(idx.length);idx.forEach(i=>arr[i]=c[i]);c=arr;}
          store.put({timestamp:new Date(entry.value.timestamp),mode:entry.value.mode,contents:c},parts.join('/'));
        });
        tx.oncomplete=()=>console.log('Import complete - refresh the page');
      };
    };
  };
  reader.readAsText(file);
};
</script>
</body></html>
